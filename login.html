<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="asserts/favicon.jpg" type="image/x-icon">

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <title>Login</title>
</head>
<body>
    <main class="container-fluid p-0">
        <div class="row g-0 vh-100">

            <!-- LEFT: LOGIN FORM -->
            <div class="col-md-6 d-flex align-items-center justify-content-center bg-white">
                <div class="w-100" style="max-width: 420px;">
                    <h1 class="mb-2">Welcome back</h1>
                    <p class="text-muted mb-4">Please enter your details</p>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input class="form-control" id="email" type="email" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <input class="form-control" id="password" type="password" placeholder="••••" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    Show
                                </button>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <a href="#" class="small text-decoration-none">Forgot password</a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3"> Log in </button>

                        <div id="loginMsg" class="text-center small mt-2"></div>

                        <p class="text-center mb-0 text-muted"> Don't have an account?
                            <a href="register.html">Sign up</a>
                        </p>
                    </form>
                </div>
            </div>

            <!-- RIGHT: IMAGE / ILLUSTRATION -->
            <div class="col-md-6 right-pane d-flex align-items-center justify-content-center">
                <img src="asserts/banner.png" alt="Banner" class="img-fluid h-80 w-80 object-fit-cover">
            </div>
        </div>
    </main>

    <!-- jQuery (needed for AJAX) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- Your login JS -->
    <script src="js/login.js"></script>  <!-- create this file -->
</body>
</html>
