<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="asserts/favicon.jpg" type="image/x-icon">
    <title>Profile</title>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm px-4">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
            <img src="asserts/logo.webp" alt="Logo" width="100" class="me-2">
        </a>

        <div class="ms-auto">
            <button id="logoutBtn" class="btn btn-outline-danger fw-semibold">Logout</button>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="container py-4">

        <!-- BANNER SECTION -->
        <div class="header-bg position-relative mb-5" id="banner" style="background-image: url('asserts/banner1.jpg');">

            <!-- Profile camera icon -->
            <input type="file" id="bannerInput" class="d-none" accept="image/*">

            <!-- Profile Image -->
            <div class="position-absolute start-50 translate-middle-x" style="bottom: -55px;">
                <div
                    class="profile-img mx-auto"
                    id="profileImage"
                    style="background-image: url('asserts/photo.webp');"
                ></div>

                <!-- Hidden input for profile picture -->
                <div class="text-center mt-2">
                    <input type="file" id="profileInput" class="d-none" accept="image/*">
                </div>
            </div>
        </div>

        <!-- USER NAME -->
        <div class="text-center mt-5">
            <h2 class="fw-bold mb-1" id="displayName"></h2>
        </div>

        <!-- FULL WIDTH FORM SECTION -->
        <div class="row mt-4 g-3">
            <div class="col-12">
                <div class="card shadow-sm p-4">
                    <form id="profileForm">
                        <!-- Row 1 -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email Address</label>
                                <input class="form-control" id="email" type="email" disabled>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Age</label>
                                <input class="form-control" id="age" type="number" min="0">
                            </div>
                        </div>

                        <!-- Row 2 -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Date of Birth</label>
                                <input class="form-control" id="dob" type="date">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contact</label>
                                <input class="form-control" id="contact" type="text">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mt-2">Save Profile</button>
                        <div id="profileMsg" class="text-center small mt-2"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery (required for profile.js) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Profile JS -->
    <script src="js/profile.js"></script>
</body>
</html>
