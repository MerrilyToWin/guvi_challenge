<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="asserts/favicon.jpg" type="image/x-icon">

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <title>Sign up</title>
</head>
<body>
    <!-- Fullscreen split layout -->
    <main class="container-fluid p-0">
        <div class="row g-0 vh-100">

            <!-- LEFT: LOGIN FORM -->
            <div class="col-md-6 d-flex align-items-center justify-content-center bg-white">
                <div class="w-100" style="max-width: 420px;">
                    <h1 class="mb-2">Welcome To Guvi</h1>
                    <p class="text-muted mb-4">Please enter your details</p>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input class="form-control" id="name" type="text" placeholder="Enter your name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input class="form-control" id="email" type="email" placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <input class="form-control" id="password" type="password" placeholder="••••" required>
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                    Show
                                </button>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <input class="form-control" id="confirmPassword" type="password" placeholder="••••" required>
                                <button class="btn btn-outline-secondary" type="button" id="toggleConfirmPassword">
                                    Show
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3"> Sign up </button>
                        <div id="registerMsg" class="text-center small mt-2"></div>
                    </form>
                </div>
            </div>
            <!-- RIGHT: IMAGE / ILLUSTRATION -->
            <div class="col-md-6 right-pane d-flex align-items-center justify-content-center">
                <img src="asserts/banner.png" alt="Banner" class="img-fluid h-80 w-80 object-fit-cover">
            </div>
        </div>
    </main>

    <!-- Bootstrap JS -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/register.js"></script>

</body>
</html>
